name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # Drop preinstalled third-party apt sources (chrome, etc.) whose mirrors can be
          # mid-sync and fail `apt-get update`; we only need the base Ubuntu archive here.
          sudo rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources || true
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          tar -C target/${{ matrix.target }}/release -czf \
            govctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz govctl
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          7z a govctl-${{ github.ref_name }}-${{ matrix.target }}.zip \
            ./target/${{ matrix.target }}/release/govctl.exe
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            govctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            govctl-${{ github.ref_name }}-${{ matrix.target }}.zip
