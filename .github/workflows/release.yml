name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release once (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" \
                 --title "${{ github.ref_name }}" \
                 --notes "Automated release for ${{ github.ref_name }}."

  build:
    needs: create-release
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          # Tolerate a flaky third-party apt source mid-sync; the base archive index is
          # already cached on the runner, so the install still resolves.
          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package and upload (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="govctl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$asset" govctl
          gh release upload "${{ github.ref_name }}" "$asset" --repo "${{ github.repository }}" --clobber
      - name: Package and upload (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="govctl-${{ github.ref_name }}-${{ matrix.target }}.zip"
          7z a "$asset" "./target/${{ matrix.target }}/release/govctl.exe"
          gh release upload "${{ github.ref_name }}" "$asset" --repo "${{ github.repository }}" --clobber
