name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --release
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Self-validate (govctl validates its own governance stack)
        run: cargo run --release -- validate . --strict
